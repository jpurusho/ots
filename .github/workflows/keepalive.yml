name: Keep Supabase Alive

# Pings Supabase multiple times daily to prevent free-tier pause (7 days inactivity)
on:
  schedule:
    - cron: '17 3 * * *'    # 3:17 AM UTC daily
    - cron: '42 9 * * *'    # 9:42 AM UTC daily
    - cron: '8 16 * * *'    # 4:08 PM UTC daily
    - cron: '53 21 * * *'   # 9:53 PM UTC daily
  workflow_dispatch:         # Manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: prod
            url_secret: SUPABASE_PROD_URL
            key_secret: SUPABASE_PROD_ANON_KEY
          # Add more projects here as needed:
          # - name: test
          #   url_secret: SUPABASE_TEST_URL
          #   key_secret: SUPABASE_TEST_ANON_KEY
    steps:
      - name: Ping ${{ matrix.name }} database
        env:
          SUPABASE_URL: ${{ secrets[matrix.url_secret] }}
          SUPABASE_KEY: ${{ secrets[matrix.key_secret] }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ]; then
            echo "Skipping ${{ matrix.name }} — secrets not configured"
            exit 0
          fi

          echo "Pinging ${{ matrix.name }}..."

          # Read from app_settings (lightweight query that touches the DB)
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/app_settings?key=eq.church_name&select=key" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}")

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✓ ${{ matrix.name }} is alive (HTTP $HTTP_CODE)"
          else
            echo "✗ ${{ matrix.name }} returned HTTP $HTTP_CODE"
            exit 1
          fi
